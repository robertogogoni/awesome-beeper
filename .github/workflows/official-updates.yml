name: Official Updates

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: scripts
        run: pnpm install

      - name: Run update script
        working-directory: scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm fetch:official

      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update versions [automated]"
          title: "Updates ${{ github.run_id }}"
          body: |
            ## Automated Updates

            This PR was generated by the official-updates workflow.

            ### Checklist
            - [ ] Review changelog entries
            - [ ] Add context tags (`[official]`, `[community]`, `[unverified]`)
            - [ ] Add "What this means" notes if needed
            - [ ] Verify feeds are correct

            ---
            *Automated by GitHub Actions*
          branch: automated/updates-${{ github.run_id }}
          labels: |
            automated
            documentation
